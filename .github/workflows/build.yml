name: Build and Release Electron App

# Trigger the workflow manually from the GitHub Actions tab
on:
  workflow_dispatch:

# Grant write permissions so the workflow can create GitHub Releases
permissions:
  contents: write

jobs:
  release-mac:
    name: Build & Publish macOS Assets
    runs-on: macos-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Speeds up builds by caching node_modules

      - name: Install Dependencies
        run: npm ci

      - name: Build and Publish macOS App
        uses: samuelmeuli/action-electron-builder@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Instruct electron-builder to compile and publish the macOS assets
          release: true
          mac: true

  release-win:
    name: Build & Publish Windows Assets
    runs-on: windows-latest
    needs: release-mac # Wait for the macOS job to create the draft release first

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Speeds up builds by caching node_modules

      - name: Install Dependencies
        run: npm ci

      - name: Build and Publish Windows App
        uses: samuelmeuli/action-electron-builder@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Instruct electron-builder to compile and publish the Windows assets
          release: true
          windows: true
