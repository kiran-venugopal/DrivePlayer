name: Build and Release Electron App

# Trigger the workflow manually from the GitHub Actions tab
on:
  workflow_dispatch:

# Grant write permissions so the workflow can create GitHub Releases
permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Assets
    runs-on: macos-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Speeds up builds by caching node_modules

      - name: Install Dependencies
        run: npm ci

      - name: Build and Publish Electron App
        # Using a reliable community action to handle compiling and uploading
        uses: samuelmeuli/action-electron-builder@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Set release to true to instruct electron-builder to publish the assets
          release: true
          # Compile both macOS and Windows installers on the same runner to avoid duplicate draft releases
          mac: true
          windows: true
