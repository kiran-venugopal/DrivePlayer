name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)
  workflow_dispatch: # Allow manual trigger from the GitHub Actions tab

permissions:
  contents: write # Required to create/upload releases

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build and Publish Electron App
        run: npm run dist -- --publish always
        env:
          # Authenticate Electron Builder
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip macOS Code Signing on the CI runner
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Use local cache folders for performance
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder


