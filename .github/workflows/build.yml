name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)
  workflow_dispatch: # Allow manual trigger from the GitHub Actions tab

permissions:
  contents: write # Required to create/upload releases

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Electron App
        run: npm run dist
        env:
          # Skip macOS Code Signing on the CI runner
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Use local cache folders for performance
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

      - name: Create GitHub Release & Upload Installer Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Determine the tag name dynamically
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${{ github.ref_name }}"
            RELEASE_TITLE="Release ${TAG_NAME}"
            PRERELEASE_FLAG=""
          else
            TAG_NAME="latest"
            RELEASE_TITLE="Latest Development Build"
            PRERELEASE_FLAG="--prerelease"
          fi

          echo "Targeting Tag: $TAG_NAME"

          # 2. Use GitHub CLI to cleanly create/overwrite the release and upload your DMGs & ZIPs
          gh release create "$TAG_NAME" \
            dist-pack/DrivePlayer-*.dmg \
            dist-pack/DrivePlayer-*-mac.zip \
            --title "$RELEASE_TITLE" \
            --generate-notes \
            $PRERELEASE_FLAG \
            --clobber # Overwrites existing files/releases for the 'latest' tag without crashing



